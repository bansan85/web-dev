<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compresseur PDF</title>
    <script type="module">
        import { _GSPS2PDF } from './worker-init.js';

        document.addEventListener("DOMContentLoaded", () => {
            const fileInput = document.getElementById("fileInput");
            const compressBtn = document.getElementById("compressBtn");
            const status = document.getElementById("status");

            compressBtn.addEventListener("click", async () => {
                if (fileInput.files.length === 0) {
                    status.textContent = "Veuillez sélectionner un fichier PDF.";
                    return;
                }

                const file = fileInput.files[0];
                const reader = new FileReader();

                reader.onload = async function (event) {
                    const arrayBuffer = event.target.result;
                    const blob = new Blob([arrayBuffer], { type: "application/pdf" });
                    const pdfDataURL = URL.createObjectURL(blob);

                    status.textContent = "Compression en cours...";

                    try {
                        const compressedUrl = await _GSPS2PDF({ psDataURL: pdfDataURL });

                        const downloadLink = document.createElement("a");
                        downloadLink.href = compressedUrl;
                        downloadLink.download = "compressed.pdf";
                        document.body.appendChild(downloadLink);
                        downloadLink.click();
                        document.body.removeChild(downloadLink);

                        status.textContent = "Compression terminée.";
                    } catch (error) {
                        console.error("Erreur lors de la compression :", error);
                        status.textContent = "Erreur lors de la compression.";
                    }
                };

                reader.readAsArrayBuffer(file);
            });
        });
    </script>
</head>

<body>
    <h1>Compresseur PDF</h1>
    <input type="file" id="fileInput" accept="application/pdf">
    <button id="compressBtn">Compresser</button>
    <p id="status"></p>
</body>

</html>
